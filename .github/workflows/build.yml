name: Build Cartoony Plugin
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 34.0.0
          components: build-tools;34.0.0
      - name: Download Gradle (8.6 – required by AGP 8.4.x)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle --version
      - name: Build AAR
        run: ./gradle-8.6/bin/gradle :cartoony:assembleDebug --stacktrace
      - name: Build CS3
        run: ./gradle-8.6/bin/gradle :cartoony:makeCs3 --stacktrace
      - name: Build Legacy CS3
        run: ./gradle-8.6/bin/gradle :cartoony:makeCs3Legacy --stacktrace
      - name: Generate plugins.json with SHA256
        run: ./gradle-8.6/bin/gradle writePluginsJson --stacktrace
      - name: Validate artifacts and plugin list
        run: |
          set -e
          test -f cartoony/build/outputs/cs3/Cartoony.cs3
          python3 - << 'PY'
          import json,sys,hashlib,os
          with open("plugins.json","r",encoding="utf-8") as f:
              data=json.load(f)
          assert isinstance(data,list) and len(data)>=1
          names=[d.get("name") for d in data]
          print("Plugins listed:", names)
          # Local checksum for modern bundle
          p="cartoony/build/outputs/cs3/Cartoony.cs3"
          h=hashlib.sha256(open(p,"rb").read()).hexdigest()
          print("Local sha256 Cartoony.cs3:",h)
          # Legacy optional
          if os.path.exists("cartoony/build/outputs/cs3/CartoonyLegacy.cs3"):
              hl=hashlib.sha256(open("cartoony/build/outputs/cs3/CartoonyLegacy.cs3","rb").read()).hexdigest()
              print("Local sha256 CartoonyLegacy.cs3:",hl)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: cartoony-aar
          path: cartoony/build/outputs/aar/*.aar
      - uses: actions/upload-artifact@v4
        with:
          name: cartoony-cs3
          path: cartoony/build/outputs/cs3/*.cs3
      - name: Publish to builds branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage artifacts in a runner temp dir (safe from git clean)
          PUBLISH_DIR="$RUNNER_TEMP/cartoony_publish"
          mkdir -p "$PUBLISH_DIR"
          cp -f cartoony/build/outputs/cs3/*.cs3 "$PUBLISH_DIR/Cartoony.cs3"
          cp -f plugins.json "$PUBLISH_DIR/plugins.json"
          # Optional legacy file
          LEGACY="cartoony/build/outputs/cs3/CartoonyLegacy.cs3"
          if [ -f "$LEGACY" ]; then cp -f "$LEGACY" "$PUBLISH_DIR/CartoonyLegacy.cs3"; fi
          # Clean the current worktree to allow branch switch
          git add -A || true
          git reset --hard
          git clean -fdx
          # Create/switch to builds branch as orphan commit history
          git fetch origin
          if git ls-remote --exit-code --heads origin builds; then
            git switch builds
          else
            git switch --orphan builds
          fi
          # Wipe the working tree clean (tracked and untracked)
          git rm -rf . || true
          git clean -fdx || true
          # Restore only the artifacts
          cp -f "$PUBLISH_DIR/Cartoony.cs3" Cartoony.cs3
          if [ -f "$PUBLISH_DIR/CartoonyLegacy.cs3" ]; then cp -f "$PUBLISH_DIR/CartoonyLegacy.cs3" CartoonyLegacy.cs3; fi
          cp -f "$PUBLISH_DIR/plugins.json" plugins.json
          git add -A
          git commit -m "Update Cartoony.cs3 and plugins.json [skip ci]" --allow-empty
          # Push current HEAD to remote 'builds' (create/update)
          git push -f origin HEAD:builds
