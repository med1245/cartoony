name: Build Cartoony Plugin
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x ./gradlew
      - run: ./gradlew :cartoony:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: cartoony-aar
          path: cartoony/build/outputs/aar/*.aar
